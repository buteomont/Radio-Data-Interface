; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32_cc1101
boards_dir = boards

[libraries]
;arduinolog = https://github.com/1technophile/Arduino-Log.git#d13cd80
arduinolog = thijse/ArduinoLog@^1.1.1
arduinojson = bblanchon/ArduinoJson@^7.2.2
rtl_433_esp = https://github.com/NorthernMan54/rtl_433_ESP.git # Use the specific GitHub URL for the forked version with fixes
;rtl_433_esp = shchuko/rtl_433_ESP@^0.3.2
mqttlib = heman/AsyncMqttClient-esphome@^2.1.0

[env]
framework = arduino
monitor_filters = esp32_exception_decoder
platform = espressif32@6.1.0
lib_ldf_mode = chain+
lib_deps = 
	${libraries.arduinolog}
	${libraries.arduinojson}
	${libraries.rtl_433_esp}
	${libraries.mqttlib}
	${libraries.arduinojson}
  ${libraries.arduinolog}

[env:esp32_cc1101]
board = esp32dev
build_flags = 
	'-DLOG_LEVEL=LOG_LEVEL_WARNING'
	'-DONBOARD_LED=2'
	'-DOOK_MODULATION=true'
	'-DRTL_DEBUG=0'
	'-DMSG_BUFFER_SIZE=4096'
	'-DMINRSSI=-82'
	'-DRF_CC1101="CC1101"'
	'-DRF_MODULE_GDO0=27'
	'-DRF_MODULE_GDO2=25'
monitor_port = /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0
monitor_speed = 921600
upload_port = /dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0
upload_speed = 921600
; lib_deps = 
; 	shchuko/rtl_433_ESP@^0.3.2
; 	bblanchon/ArduinoJson@^7.2.2
	

